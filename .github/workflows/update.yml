name: Update M3U Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Fetch M3U playlist
        run: |
          curl -fsSL -o playlist.m3u "https://servertvhub.site/jiotv+/playlist.php" || wget -q -O playlist.m3u "https://servertvhub.site/jiotv+/playlist.php"
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet playlist.m3u; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git add playlist.m3u
          git commit -m "Auto-update: Fetch latest M3U playlist [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
          git push
