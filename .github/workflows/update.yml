name: Update M3U Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Fetch M3U playlist with detailed output
        run: |
          echo "Attempting to fetch playlist..."
          curl -v -o playlist.m3u "https://servertvhub.site/jiotv+/playlist.php" 2>&1
          echo "File size:"
          ls -lh playlist.m3u || echo "File not created!"
          echo "File contents (first 10 lines):"
          head -10 playlist.m3u || echo "Cannot read file"
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Commit and push changes
        run: |
          git add playlist.m3u
          git commit -m "Auto-update: Fetch latest M3U playlist [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]" || echo "No changes to commit"
          git push || echo "Nothing to push"
